<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Fossil Identifier</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>🦴 AI Fossil Identifier</h1>
        <p>Upload a fossil image below to identify fossil</p>

        <form action="{{ url_for('predict') }}" method="POST" enctype="multipart/form-data" class="upload-section">
            <input type="file" name="image" accept="image/*" required>
            <button type="submit">🔍 Identify Fossil</button>
        </form>

        <div class="preview" id="preview"></div>
    </div>

    <script>
        const fileInput = document.querySelector('input[type="file"]');
        const preview = document.getElementById('preview');

        fileInput.addEventListener('change', () => {
            const file = fileInput.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
                };
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>
</html>
